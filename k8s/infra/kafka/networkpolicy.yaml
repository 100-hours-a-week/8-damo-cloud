apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-netpol
  namespace: prod
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: kafka
  policyTypes:
    - Ingress
  ingress:
    # 내부 클라이언트 (BE, AI) → client 리스너
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 9092
    - from:
        - podSelector:
            matchLabels:
              app: ai
      ports:
        - port: 9092
    # 브로커 간 내부 통신 (interbroker + controller)
    - from:
        - podSelector:
            matchLabels:
              strimzi.io/cluster: kafka
      ports:
        - port: 9090  # Strimzi 내부 통신
        - port: 9091  # Strimzi 내부 통신
        - port: 9093  # controller (KRaft)
    # 외부 접근 (NodePort → external 리스너)
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 9095  # external listener
