# KafkaNodePool: 브로커 3개가 controller+broker 역할을 겸하는 combined 모드
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: combined
  namespace: prod
  labels:
    strimzi.io/cluster: kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 20Gi
        class: gp3-ebs
        deleteClaim: false
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  template:
    pod:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    strimzi.io/cluster: kafka
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              strimzi.io/cluster: kafka
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              strimzi.io/cluster: kafka
---
# Kafka CR: 리스너, 설정, PDB 등 클러스터 전체 설정
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka
  namespace: prod
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV0
    listeners:
      # 내부 클라이언트 (BE, AI)
      - name: plain
        port: 9092
        type: internal
        tls: false
      # 외부 클라이언트 (RunPod) → NodePort
      - name: external
        port: 9095
        type: nodeport
        tls: false
        configuration:
          bootstrap:
            nodePort: 32090
          brokers:
            - broker: 0
              advertisedHost: kafka.damo.today
              nodePort: 32092
            - broker: 1
              advertisedHost: kafka.damo.today
              nodePort: 32093
            - broker: 2
              advertisedHost: kafka.damo.today
              nodePort: 32094
    config:
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      log.retention.hours: 168
    template:
      podDisruptionBudget:
        maxUnavailable: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
