apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-scripts
  namespace: {{ .Values.namespace }}
data:
  start.sh: |
    #!/bin/sh
    SENTINEL_PORT="{{ .Values.sentinel.port }}"
    MASTER_NAME="{{ .Values.redis.masterName }}"
    DEFAULT_MASTER="{{ .Values.appName }}-0.{{ .Values.appName }}-headless.{{ .Values.namespace }}.svc.cluster.local"
    REDIS_PORT="{{ .Values.redis.port }}"
    QUORUM="{{ .Values.sentinel.quorum }}"
    SENTINEL_SVC="{{ .Values.appName }}-sentinel.{{ .Values.namespace }}.svc.cluster.local"
    MY_IP=$(hostname -i)

    # 기존 sentinel에서 현재 master 조회 (재시도 3회)
    MASTER_HOST=""
    for i in $(seq 1 3); do
      MASTER_HOST=$(redis-cli -h "$SENTINEL_SVC" -p "$SENTINEL_PORT" \
        SENTINEL get-master-addr-by-name "$MASTER_NAME" 2>/dev/null | head -1)
      [ -n "$MASTER_HOST" ] && break
      sleep 2
    done

    # sentinel 없으면 redis-0을 초기 master로
    [ -z "$MASTER_HOST" ] && MASTER_HOST="$DEFAULT_MASTER"

    # master가 응답할 때까지 대기
    until redis-cli -h "$MASTER_HOST" -p "$REDIS_PORT" PING 2>/dev/null | grep -q PONG; do
      echo "master 대기 중: $MASTER_HOST"
      sleep 2
    done

    # hostname이면 IP로 변환 (redis-sentinel은 conf에 IP가 필요)
    if echo "$MASTER_HOST" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
      MASTER_IP="$MASTER_HOST"
    else
      MASTER_IP=$(nslookup "$MASTER_HOST" 2>/dev/null | grep "Address:" | grep -v "#" | tail -1 | awk '{print $2}')
      [ -z "$MASTER_IP" ] && MASTER_IP="$MASTER_HOST"
    fi

    cat > /tmp/sentinel.conf << EOF
    port $SENTINEL_PORT
    bind 0.0.0.0
    protected-mode no
    sentinel announce-ip $MY_IP
    sentinel announce-port $SENTINEL_PORT
    sentinel monitor $MASTER_NAME $MASTER_IP $REDIS_PORT $QUORUM
    sentinel down-after-milliseconds $MASTER_NAME {{ .Values.sentinel.downAfterMilliseconds }}
    sentinel failover-timeout $MASTER_NAME {{ .Values.sentinel.failoverTimeout }}
    sentinel parallel-syncs $MASTER_NAME 1
    EOF

    exec redis-sentinel /tmp/sentinel.conf
