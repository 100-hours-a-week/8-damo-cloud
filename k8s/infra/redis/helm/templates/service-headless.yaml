# Redis StatefulSetВџЕ headless service (Pod DNS ВЃЮВё▒: redis-0.redis-headless.prod.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-headless
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: {{ .Values.appName }}
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
      protocol: TCP
---
# Sentinel StatefulSetВџЕ headless service (serviceName ВџћЖхгВѓгьЋГ)
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-sentinel-headless
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: {{ .Values.appName }}-sentinel
  ports:
    - port: {{ .Values.sentinel.port }}
      targetPort: {{ .Values.sentinel.port }}
      protocol: TCP
