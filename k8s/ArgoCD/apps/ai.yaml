apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/100-hours-a-week/8-damo-cloud.git
    targetRevision: main
    path: k8s/ai/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
