appName: frontend
namespace: prod

replicaCount: 2

strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

image:
  repository: 080598576517.dkr.ecr.ap-northeast-2.amazonaws.com/prod/fe
  tag: a272e2e
  pullPolicy: Always

containerPort: 3000

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

podAntiAffinity:
  enabled: true
  weight: 100
