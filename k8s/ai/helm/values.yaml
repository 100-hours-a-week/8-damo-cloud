appName: ai
namespace: prod

replicaCount: 2

strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

image:
  repository: 080598576517.dkr.ecr.ap-northeast-2.amazonaws.com/prod/ai
  tag: latest
  pullPolicy: Always

containerPort: 8000

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: "300m"
    memory: "1Gi"
  limits:
    cpu: "1500m"
    memory: "2Gi"

podAntiAffinity:
  enabled: true
  weight: 100

# kubectl로 별도 생성
secretName: ai-secret

configmap:
  GEMINI_MODEL: "gemini-3-flash-preview"
  AWS_ENDPOINT_URL: "https://damo.today"
  AWS_REGION: "ap-northeast-2"
