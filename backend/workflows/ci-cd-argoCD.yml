name: Backend CI/CD (ArgoCD)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  JAVA_VERSION: "21"
  AWS_REGION: ap-northeast-2
  ECR_REPO_PROD: 080598576517.dkr.ecr.ap-northeast-2.amazonaws.com/prod/be
  INFRA_REPO: 100-hours-a-week/8-damo-cloud
  HELM_VALUES_PATH: k8s/be/helm/values.yaml

jobs:
  ci:
    name: CI (test/build)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/6380) >/dev/null 2>&1; then
              echo "Redis is up"
              exit 0
            fi
            sleep 1
          done
          echo "Redis did not become ready in time"
          exit 1

      - name: Run Unit Tests
        run: ./gradlew test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Run Integration Tests (if exists)
        run: |
          if ./gradlew -q tasks --all | grep -q "^integrationTest"; then
            ./gradlew integrationTest
          else
            echo "integrationTest task not found. Skipping."
          fi

      - name: Build bootJar
        run: ./gradlew bootJar

  build_push:
    name: Build & Push (ECR)
    runs-on: ubuntu-24.04-arm
    needs: [ci]
    if: github.event_name == 'push' && needs.ci.result == 'success'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve environment
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "ECR_REPO=${{ env.ECR_REPO_PROD }}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REPO }}:latest
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update_helm:
    name: Update Helm values (ArgoCD)
    runs-on: ubuntu-latest
    needs: build_push

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          ref: main

      - name: Update image tag in values.yaml
        run: |
          IMAGE_TAG=${{ needs.build_push.outputs.image_tag }}
          sed -i "s/^  tag: .*/  tag: ${IMAGE_TAG}/" ${{ env.HELM_VALUES_PATH }}

      - name: Commit and push
        run: |
          git config user.email "sde101573@gmail.com"
          git config user.name "solyrion"
          git add ${{ env.HELM_VALUES_PATH }}
          if git diff --staged --quiet; then
            echo "No changes to commit, image tag already up to date."
          else
            git commit -m "ci: update be image tag to ${{ needs.build_push.outputs.image_tag }}"
            git push
          fi

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [ci, build_push, update_helm]
    if: always() && github.event_name == 'push'

    steps:
      - name: Send notification
        run: |
          CI_RESULT="${{ needs.ci.result }}"
          BUILD_RESULT="${{ needs.build_push.result }}"
          HELM_RESULT="${{ needs.update_helm.result }}"
          REF="${{ github.repository }}@${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"username\":\"Backend CI/CD\",\"content\":\"🖥️ Backend CI/CD 결과 (ArgoCD)\\n- CI: **${CI_RESULT}**\\n- Build & Push: **${BUILD_RESULT}**\\n- Helm Update: **${HELM_RESULT}**\\n🔗 [${REF}](${RUN_URL})\"}" \
               ${{ secrets.DISCORD_WEBHOOK_TEST_URL }}
