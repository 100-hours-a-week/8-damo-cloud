# prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 자체 메트릭 (동작 확인용)
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # ===== (나중에) 앱 서버 타겟 추가 예시 =====
  - job_name: "damo-fe"
    static_configs:
      - targets: ["10.1.0.47:9100"]

  - job_name: "damo-be"
    static_configs:
      - targets: ["10.1.0.5:9100"]

  - job_name: "damo-ai"
    static_configs:
      - targets: ["10.1.0.54:9100"]

  - job_name: "damo-db"
    static_configs:
      - targets: ["10.1.0.64:9100"]

  - job_name: "damo-kafka"
    static_configs:
      - targets: ["10.1.0.140:9100"]

  - job_name: "spring-actuator"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "10.1.0.5:8080"

  - job_name: "kafka-actuator"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "10.1.0.140:9308"

  - job_name: "redis-exporter"
    static_configs:
      - targets:
          - "10.1.0.64:9121"