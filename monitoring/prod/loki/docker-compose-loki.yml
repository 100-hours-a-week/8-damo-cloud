version: "3.8"
services:
  loki:
    image: grafana/loki:2.9.6
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks:
      - ubuntu_default
    restart: always

networks:
  ubuntu_default:
    external: true

volumes:
  loki_data: