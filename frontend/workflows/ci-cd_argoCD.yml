name: CI/CD Pipeline (ArgoCD)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO_PROD: prod/fe
  AWS_REGION: ap-northeast-2
  INFRA_REPO: 100-hours-a-week/8-damo-cloud
  HELM_VALUES_PATH: k8s/fe/helm/values.yaml

jobs:
  ci:
    name: CI (format/lint/build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      #      - name: Check formatting (Prettier)
      #        run: npm run format:check

      - name: Run Lint (ESLint)
        run: npm run lint

      # 테스트 도입 전이면 주석 유지 추후 도입
      # - name: Run Unit Tests
      #   run: npm run test

  build_push:
    name: Build & Push (ECR)
    runs-on: ubuntu-24.04-arm
    needs: [ci]
    if: github.event_name == 'push' && needs.ci.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            API_URL="${{ secrets.NEXT_PUBLIC_API_URL_PROD }}"
            REDIRECT_URI="${{ secrets.NEXT_PUBLIC_KAKAO_REDIRECT_URI_PROD }}"
            BROKER_URL="${{ secrets.NEXT_PUBLIC_BROKER_URL_PROD }}"
          else
            API_URL="${{ secrets.NEXT_PUBLIC_API_URL_DEV }}"
            REDIRECT_URI="${{ secrets.NEXT_PUBLIC_KAKAO_REDIRECT_URI_DEV }}"
            BROKER_URL="${{ secrets.NEXT_PUBLIC_BROKER_URL_DEV }}"
          fi
          {
            echo "NEXT_PUBLIC_API_URL=${API_URL}"
            echo "NEXT_PUBLIC_KAKAO_CLIENT_ID=${{ secrets.NEXT_PUBLIC_KAKAO_CLIENT_ID }}"
            echo "NEXT_PUBLIC_KAKAO_REDIRECT_URI=${REDIRECT_URI}"
            echo "NEXT_PUBLIC_S3_CDN=${{ secrets.NEXT_PUBLIC_S3_CDN }}"
            echo "NEXT_PUBLIC_KAKAO_SDK_KEY=${{ secrets.NEXT_PUBLIC_KAKAO_SDK_KEY }}"
            echo "NEXT_PUBLIC_KAKAO_SDK_TEST_KEY=${{ secrets.NEXT_PUBLIC_KAKAO_SDK_TEST_KEY }}"
            echo "NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}"
            echo "NEXT_PUBLIC_WEB_PUSH_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_WEB_PUSH_PUBLIC_KEY }}"
            echo "NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}"
            echo "NEXT_PUBLIC_BROKER_URL=${BROKER_URL}"
            echo "NEXT_PUBLIC_RECEIPT_WASM=${{ secrets.NEXT_PUBLIC_RECEIPT_WASM }}"
            echo "NEXT_PUBLIC_RECEIPT_MODEL=${{ secrets.NEXT_PUBLIC_RECEIPT_MODEL }}"
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}"
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}"
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}"
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}"
            echo "NEXT_PUBLIC_FIREBASE_APPID=${{ secrets.NEXT_PUBLIC_FIREBASE_APPID }}"
            echo "NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}"
            echo "APP_ENV=dev"
          } > .env

      - name: Resolve environment
        env:
          ECR_REPO_DEV: 080598576517.dkr.ecr.ap-northeast-2.amazonaws.com/dev/fe
          ECR_REPO_PROD: 080598576517.dkr.ecr.ap-northeast-2.amazonaws.com/prod/fe
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE_TAG=${SHORT_SHA}
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            ECR_REPO="${ECR_REPO_PROD}"
          else
            ECR_REPO="${ECR_REPO_DEV}"
          fi
          echo "ECR_REPO=${ECR_REPO}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE=${ECR_REPO}:${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "LATEST_IMAGE=${ECR_REPO}:latest" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.LATEST_IMAGE }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update_helm:
    needs: build_push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          ref: main

      - name: Update image tag in values.yaml
        run: |
          IMAGE_TAG=${{ needs.build_push.outputs.image_tag }}
          sed -i "s/^  tag: .*/  tag: ${IMAGE_TAG}/" ${{ env.HELM_VALUES_PATH }}

      - name: Commit and push
        run: |
          git config user.email "kusumin38@gmail.com"
          git config user.name "tn-als"
          git add ${{ env.HELM_VALUES_PATH }}
          if git diff --staged --quiet; then
            echo "No changes to commit, image tag already up to date."
          else                                             
            git commit -m "ci: update fe image tag to ${{ needs.build_push.outputs.image_tag }}"                  
            git push                                       
          fi                          

  k6_test:
    needs: update_helm
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1

      - name: k6-home-test
        uses: grafana/run-k6-action@v1
        env:
          URL: ${{ secrets.HOME_URL}}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          path: tests/page_loading.js

      - name: k6-group-detail-test
        uses: grafana/run-k6-action@v1
        env:
          URL: ${{ secrets.GROUP_DETAIL_URL }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          path: tests/page_loading.js

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [ci, build_push, update_helm, k6_test]
    if: github.event_name == 'push' && always()

    steps:
      - name: Send notification
        run: |
          CI_RESULT="${{ needs.ci.result }}"
          BUILD_RESULT="${{ needs.build_push.result }}"
          DEPLOY_RESULT="${{ needs.update_helm.result }}"
          K6_RESULT="${{ needs.k6_test.result }}"
          REF="${{ github.repository }}@${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"username\":\"Frontend CI/CD\",\"content\":\"🖥️ Frontend CI/CD 결과\\n- CI: **${CI_RESULT}**\\n- Build: **${BUILD_RESULT}**\\n- Deploy: **${DEPLOY_RESULT}**\\n- K6: **${K6_RESULT}**\\n🔗 [${REF}](${RUN_URL})\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

